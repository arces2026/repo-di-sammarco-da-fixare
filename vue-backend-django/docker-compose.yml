services:
  db:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Se DB_USER è "root", MARIADB_ROOT_PASSWORD deve coincidere con DB_PASSWORD
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
    container_name: django-backend

      # Comanda il comando che deve essere eseguito all'avvio del container
    command: ./wait-for-it.sh db:3306 -t 30 -- python manage.py runserver 0.0.0.0:8000

    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data: